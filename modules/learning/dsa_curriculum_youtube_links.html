
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.phase{margin-bottom:2rem}
.phase-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:10px;cursor:pointer;user-select:none;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.phase-header:hover{background:var(--color-background-tertiary)}
.phase-title{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1}
.phase-badge{font-size:11px;padding:3px 8px;border-radius:20px}
.topic-grid{display:none;gap:8px;flex-direction:column}
.topic-grid.open{display:flex}
.topic-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;background:var(--color-background-primary)}
.topic-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.topic-row:hover{background:var(--color-background-secondary)}
.topic-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.topic-name{font-size:14px;color:var(--color-text-primary);flex:1}
.topic-level{font-size:11px;padding:2px 7px;border-radius:10px}
.topic-chevron{font-size:14px;color:var(--color-text-secondary);transition:transform 0.2s}
.topic-chevron.open{transform:rotate(90deg)}
.video-panel{display:none;border-top:0.5px solid var(--color-border-tertiary);padding:0 14px 14px}
.video-panel.open{display:block}
.channel-row{display:flex;align-items:center;gap:8px;margin:10px 0 8px;flex-wrap:wrap}
.channel-label{font-size:12px;color:var(--color-text-secondary)}
.channel-name{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.embed-container{position:relative;padding-bottom:56.25%;height:0;border-radius:6px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.embed-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.copy-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;margin-top:8px}
.copy-btn:hover{background:var(--color-background-secondary)}
.embed-code{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);word-break:break-all;margin-top:6px;display:none}
.embed-code.open{display:block}
.alt-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.alt-link{font-size:12px;color:var(--color-text-info);text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.alt-link:hover{text-decoration:underline}
.lv-b{background:#eaf3de;color:#3b6d11}
.lv-i{background:#faeeda;color:#854f0b}
.lv-a{background:#fcebeb;color:#a32d2d}
.ph-0{background:#eeedfe;color:#534ab7}.ph-1{background:#eededfe;color:#534ab7}
.ph{background:#e6f1fb;color:#185fa5}
.pq{background:#f4c0d1;color:#993556}
.expand-all{font-size:12px;padding:5px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;margin-bottom:12px}
.expand-all:hover{background:var(--color-background-secondary)}
</style>

<div class="wrap">
<h2 class="sr-only">DSA curriculum YouTube video links</h2>
<button class="expand-all" onclick="toggleAll()">Expand all phases</button>

<div id="curriculum"></div>
</div>

    {icon:"🔍",name:"Searching algorithms",level:"b",vid:"P3YID7liBug",ch:"freeCodeCamp",alt:[{l:"Binary search",v:"KsoUiNv1SZA"}]},
    {icon:"🧪",name:"Phase 1 quiz — Complexity & arrays",level:"q",vid:"v4cd1O4zkGw",ch:"HackerRank",alt:[]},
  ]},
  {phase:"Phase 2 — Linear data structures",color:"ph",topics:[
    {icon:"📚",name:"Stack & queue",level:"b",vid:"wjI1WNcIntg",ch:"William Fiset",alt:[{l:"Stacks explained",v:"I37kGX-nZEI"}]},
    {icon:"🔗",name:"Linked lists",level:"i",vid:"Hj_rA0dhr2I",ch:"William Fiset",alt:[{l:"CS Dojo linked list",v:"njTh_OwMljA"}]},
    {icon:"🗂️",name:"Hash tables",level:"i",vid:"KyUTuwz_b7Q",ch:"CS Dojo",alt:[{l:"William Fiset hash",v:"2E54GqF0H4s"}]},
    {icon:"⛰️",name:"Heaps (priority queues)",level:"i",vid:"t0Cq6tVNRBA",ch:"William Fiset",alt:[]},

    {icon:"🛤️",name:"Tree traversals",level:"b",vid:"WLvU5ZuwqIk",ch:"William Fiset",alt:[{l:"NeetCode traversals",v:"QhszUQhGGlA"}]},
    {icon:"⚖️",name:"AVL trees & balancing",level:"a",vid:"q4fnJZr8ztY",ch:"Abdul Bari",alt:[{l:"William Fiset AVL",v:"g4y2h-PzsJQ"}]},

    {icon:"🧪",name:"Phase 3 quiz — Trees & graphs",level:"q",vid:"WLvU5ZuwqIk",ch:"William Fiset",alt:[]},

function lvClass(l){return l==="b"?"lv-b":l==="i"?"lv-i":l==="a"?"lv-a":"pq"}
function lvLabel(l){return l==="b"?"Beginner":l==="i"?"Intermediate":l==="a"?"Advanced":"Quiz"}

function buildCurriculum(){
  const wrap = document.getElementById("curriculum");
  data.forEach((phase,pi)=>{
    const phDiv = document.createElement("div");
    phDiv.className="phase";
    phDiv.innerHTML=`<div class="phase-header" onclick="togglePhase(${pi})">
      <span class="phase-title">${phase.phase}</span>
      <span class="phase-badge ph" style="background:#e6f1fb;color:#185fa5">${phase.topics.length} topics</span>
      <i class="ti ti-chevron-right topic-chevron" id="phchev${pi}" aria-hidden="true"></i>
    </div>
    <div class="topic-grid" id="phase${pi}"></div>`;
    wrap.appendChild(phDiv);
    const grid = phDiv.querySelector(`#phase${pi}`);
    phase.topics.forEach((t,ti)=>{
      const card = document.createElement("div");
      card.className="topic-card";
      const embedCode=`<iframe width="560" height="315" src="https://www.youtube.com/embed/${t.vid}" title="${t.name}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      const alts = t.alt.map(a=>`<a class="alt-link" href="https://www.youtube.com/watch?v=${a.v}" target="_blank"><i class="ti ti-external-link" aria-hidden="true"></i>${a.l}</a>`).join("");
      card.innerHTML=`<div class="topic-row" onclick="toggleTopic(${pi},${ti})">
        <span class="topic-icon" aria-hidden="true">${t.icon}</span>
        <span class="topic-name">${t.name}</span>
        <span class="topic-level ${lvClass(t.level)}">${lvLabel(t.level)}</span>
        <i class="ti ti-chevron-right topic-chevron" id="chev${pi}_${ti}" aria-hidden="true"></i>
      </div>
      <div class="video-panel" id="panel${pi}_${ti}">
        <div class="channel-row"><span class="channel-label">Channel:</span><span class="channel-name">${t.ch}</span>
          <a class="alt-link" href="https://www.youtube.com/watch?v=${t.vid}" target="_blank" style="margin-left:auto"><i class="ti ti-external-link" aria-hidden="true"></i>Open in YouTube</a>
        </div>
        <div class="embed-container"><iframe src="https://www.youtube.com/embed/${t.vid}" title="${t.name}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="copy-btn" onclick="copyEmbed('${pi}_${ti}')"><i class="ti ti-copy" aria-hidden="true"></i>Copy embed code</button>
          <button class="copy-btn" onclick="toggleCode('${pi}_${ti}')"><i class="ti ti-code" aria-hidden="true"></i>Show embed code</button>
        </div>
        <div class="embed-code" id="code${pi}_${ti}">${embedCode.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        ${t.alt.length?`<div style="margin-top:8px"><span style="font-size:12px;color:var(--color-text-secondary)">Alternative videos: </span><div class="alt-links">${alts}</div></div>`:""}
      </div>`;
      grid.appendChild(card);
      card.querySelector(`#chev${pi}_${ti}`).__embedCode = embedCode;
    });
  });
}

function togglePhase(pi){
  const grid=document.getElementById(`phase${pi}`);
  const chev=document.getElementById(`phchev${pi}`);
  const isOpen=grid.classList.contains("open");
  grid.classList.toggle("open",!isOpen);
  chev.classList.toggle("open",!isOpen);
}
function toggleTopic(pi,ti){
  const panel=document.getElementById(`panel${pi}_${ti}`);
  const chev=document.getElementById(`chev${pi}_${ti}`);
  const isOpen=panel.classList.contains("open");
  panel.classList.toggle("open",!isOpen);
  chev.classList.toggle("open",!isOpen);
}
function toggleCode(id){
  const el=document.getElementById(`code${id}`);
  el.classList.toggle("open");
}
function copyEmbed(id){
  const topics=[];
  data.forEach((p,pi)=>{p.topics.forEach((t,ti)=>{if(`${pi}_${ti}`===id)topics.push(t)})});
  if(!topics.length)return;
  const t=topics[0];
  const code=`<iframe width="560" height="315" src="https://www.youtube.com/embed/${t.vid}" title="${t.name}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  navigator.clipboard.writeText(code).catch(()=>{});
  const btn=document.querySelector(`[onclick="copyEmbed('${id}')"]`);
  if(btn){const orig=btn.innerHTML;btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i>Copied!';setTimeout(()=>btn.innerHTML=orig,1500)}
}
function toggleAll(){
  const allOpen = data.every((_,pi)=>document.getElementById(`phase${pi}`).classList.contains("open"));
  data.forEach((_,pi)=>{
    document.getElementById(`phase${pi}`).classList.toggle("open",!allOpen);
    document.getElementById(`phchev${pi}`).classList.toggle("open",!allOpen);
  });
  document.querySelector(".expand-all").textContent=allOpen?"Expand all phases":"Collapse all phases";
}
buildCurriculum();
</script>
